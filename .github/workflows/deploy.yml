name: map-data-fetcher CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew clean bootJar -x test

      - name: Copy JAR to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "build/libs/*.jar"
          target: "~/map-data-fetcher/build/libs"
          strip_components: 2

      - name: Restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ~/map-data-fetcher

            if pm2 describe map-data-fetcher > /dev/null
            then
              pm2 restart map-data-fetcher --update-env
            else
              pm2 start /usr/bin/java \
                --name map-data-fetcher \
                -- -jar build/libs/map-data-fetcher-0.0.1-SNAPSHOT.jar \
                --server.address=127.0.0.1 \
                --server.port=8080 \
                --naver.map.selenium.headless=true
            fi

            pm2 save