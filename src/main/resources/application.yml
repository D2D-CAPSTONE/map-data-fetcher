spring:
  application:
    name: map-data-fetcher

kakao:
  map:
    client:
      base-url: https://search.map.kakao.com
      referer: https://map.kakao.com/
      user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36

naver:
  map:
    selenium:
      search-url: https://map.naver.com/p/search/
      response-url-keyword: /p/api/search/allSearch
      headless: false
      timeout: 15s
